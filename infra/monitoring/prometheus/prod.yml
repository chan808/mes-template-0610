global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Spring Boot (Blue/Green 양쪽 scrape, 내려간 쪽은 자동 실패 처리)
  - job_name: 'agolive-api'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['agolive-api-blue:8080', 'agolive-api-green:8080']

  # Go Realtime
  - job_name: 'agolive-realtime'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['agolive-realtime-blue:8081', 'agolive-realtime-green:8081']

  # EC2 시스템 메트릭
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['agolive-node-exporter:9100']
