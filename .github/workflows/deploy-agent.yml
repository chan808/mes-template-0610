name: deploy-agent

on:
  push:
    branches: [main]
    paths:
      - 'agolive-agent/**'
      - '.github/workflows/deploy-agent.yml'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - uses: aws-actions/amazon-ecr-login@v2

      - uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./agolive-agent
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ vars.AWS_REGION }}.amazonaws.com/agolive-agent:${{ github.sha }}
            ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ vars.AWS_REGION }}.amazonaws.com/agolive-agent:latest

  deploy:
    needs: build-push
    runs-on: ubuntu-latest
    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Deploy via SSM
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ vars.EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --parameters "commands=[\"/opt/agolive/infra/scripts/deploy.sh agent ${{ github.sha }}\"]" \
            --output text \
            --query "Command.CommandId")
          echo "SSM Command: $COMMAND_ID"
          for i in $(seq 1 60); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "${{ vars.EC2_INSTANCE_ID }}" \
              --query "Status" --output text 2>/dev/null || echo "Pending")
            case "$STATUS" in
              Success) echo "배포 성공"; break ;;
              Failed|TimedOut|Cancelled|Cancelling)
                aws ssm get-command-invocation \
                  --command-id "$COMMAND_ID" \
                  --instance-id "${{ vars.EC2_INSTANCE_ID }}" \
                  --query "StandardErrorContent" --output text >&2
                exit 1 ;;
              *) echo "[$i/60] $STATUS — 10초 후 재확인..."; sleep 10 ;;
            esac
          done
          [ "$STATUS" = "Success" ] || { echo "ERROR: 10분 타임아웃"; exit 1; }
